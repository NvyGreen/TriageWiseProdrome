name: backend-tests

# Triggers are deliberately unfiltered. Path filtering lives on the `pytest`
# job instead (via the `changes` job below), because a workflow skipped by an
# `on:` path filter never reports a status at all — so a required `pytest`
# check sits at "Expected - Waiting for status to be reported" and blocks the
# PR forever. A job skipped by `if:` does report, which satisfies the check.
on:
  push:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Detect backend changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - "backend/**"
              - ".github/workflows/backend-tests.yml"

  pytest:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: triagewise
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      # Both files are compiled locks (exact versions + hashes) — see
      # requirements.in. --require-hashes makes pip reject anything not pinned
      # in them, so a transitive dependency can never slip in unreviewed.
      # requirements-scripts.txt is deliberately not installed: only
      # scripts/derive_condition_reference.py needs pandas, and CI never runs it.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        env:
          SECRET_KEY: test-secret-key
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: "5432"
          # conftest.py derives and creates the "<DB_NAME>_test" database
          DB_NAME: triagewise
        run: pytest
